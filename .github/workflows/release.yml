name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: true
        type: string
      test_release_only:
        description: "Test GitHub Release only (skip actual release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    # Skip this job in test mode
    if: ${{ github.event.inputs.test_release_only == 'false' }}
    runs-on: ubuntu-latest
    env:
        VERSION: ${{ github.event.inputs.version }}
        BRANCH: releases/${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v3
        with:
          ref: releases/${{ github.event.inputs.version }}
          ssh-key: ${{ secrets.USER_SSH_KEY }}
          fetch-depth: 0
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"
      - name: Set up Git
        run: |
          echo "${{ secrets.USER_GPG_KEY }}" | gpg --import
          git config --add user.name "${{ secrets.USER_NAME }}"
          git config --add user.email "${{ secrets.USER_MAIL }}"
          git config --add user.signingkey "${{ secrets.USER_GPG_ID }}"
          git config commit.gpgsign true
      - name: Run build
        run: |
          pip install --no-cache-dir hatch==1.14.0
          hatch version ${{ env.VERSION }}
          hatch --verbose build
      - name: Merge release branch
        run: |
          git commit -am "Release ${{ env.VERSION }}: increment version"
          git checkout main
          git merge --no-ff ${{ env.BRANCH }}
          git tag -a v${{ env.VERSION }} -m "Release ${{ env.VERSION }}"
          git checkout ${{ env.BRANCH }}
          git merge --ff-only main
          git checkout develop
          git merge --no-ff ${{ env.BRANCH }}
          git push --atomic origin main develop refs/tags/v${{ env.VERSION }} :${{ env.BRANCH }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5
      
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          verbose: true

  mock-build:
    if: ${{ github.event.inputs.test_release_only == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Build or mock artifacts
        run: |
          VERSION="${{ github.event.inputs.version }}"
          
          if ! git tag | grep -q "^v${VERSION}$"; then
            echo "Tag v${VERSION} not found"
            echo "Available tags:"
            git tag | tail -5
            exit 1
          fi

          pip install --no-cache-dir hatch==1.14.0
          git checkout v${VERSION}
          hatch build

          ls -lh dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  create-github-release:
    name: Create GitHub Release
    # Wait for release or mock-build to complete
    needs: [release, mock-build]
    if: always() && (needs.release.result == 'success' || needs.mock-build.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        run: |
          VERSION="${{ github.event.inputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 v${VERSION}^ 2>/dev/null || echo "")
          
          if [ "${{ github.event.inputs.test_release_only }}" = "true" ]; then
            echo "**TEST MODE**" > release_notes.md
            echo "" >> release_notes.md
          fi
          
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "pip install YOUR_PACKAGE_NAME==${VERSION}" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" >> release_notes.md
            echo "" >> release_notes.md
            git log ${PREV_TAG}..v${VERSION} --pretty=format:"- %s (%h)" >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "## Verification" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "gh attestation verify <file> --owner=YOUR_ORG --repo=YOUR_REPO" >> release_notes.md
          echo '```' >> release_notes.md
          
          cat release_notes.md

      - name: Create GitHub Release (using gh CLI)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          IS_TEST="${{ github.event.inputs.test_release_only }}"
        
          CMD="gh release create v${VERSION}"
          CMD="$CMD --title 'Release ${VERSION}'"
          CMD="$CMD --notes-file release_notes.md"
        
          for file in dist/*; do
            CMD="$CMD $file"
          done
        
          if [ "$IS_TEST" = "true" ]; then
            CMD="$CMD --draft"
            echo "Creating DRAFT release..."
          else
            echo "Creating PUBLISHED release..."
          fi
        
          echo "Running: $CMD"
          eval $CMD
        
          echo ""
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"

      - name: Generate build attestations
        if: ${{ github.event.inputs.test_release_only == 'false' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'



